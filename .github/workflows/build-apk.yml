# Сборка release APK.
#
# Секреты подписи (Settings → Secrets → Actions):
#   KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS — см. android/SIGNING.md
#
# push / workflow_dispatch: без секретов — job упадёт (нужен ваш keystore).
# pull_request: секреты не используются — APK подписан debug-ключом Gradle.

name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-

      - name: Dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib --no-fatal-infos

      - name: Tests
        run: flutter test

      - name: Decode keystore and key.properties (release signing)
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -e
          if [ -z "${KEYSTORE_BASE64}" ] || [ -z "${KEYSTORE_PASSWORD}" ] || [ -z "${KEY_ALIAS}" ]; then
            echo "::error::Нет секретов подписи. Добавьте KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS (см. android/SIGNING.md)."
            exit 1
          fi
          mkdir -p android/app
          printf '%s' "${KEYSTORE_BASE64}" | base64 -d > android/app/release-keystore.jks
          test -s android/app/release-keystore.jks
          {
            echo "storePassword=${KEYSTORE_PASSWORD}"
            echo "keyPassword=${KEYSTORE_PASSWORD}"
            echo "keyAlias=${KEY_ALIAS}"
            echo "storeFile=release-keystore.jks"
          } > android/key.properties
          echo "Подпись настроена (alias скрыт)."

      - name: Verify keystore alias
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          keytool -list -keystore android/app/release-keystore.jks -storepass "${KEYSTORE_PASSWORD}" -alias "${KEY_ALIAS}"

      - name: Build APK (release, signed)
        if: github.event_name != 'pull_request'
        run: flutter build apk --release

      - name: Build APK (PR — debug signing)
        if: github.event_name == 'pull_request'
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
